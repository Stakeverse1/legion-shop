<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legion Shop Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #f5a623;
    --orange-dark: #c47d0e;
    --orange-light: #fff3d6;
    --orange-glow: rgba(245,166,35,0.15);
    --bg: #ffffff;
    --bg2: #fafafa;
    --bg3: #f4f4f4;
    --border: #e8e8e8;
    --border2: #d0d0d0;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;
    --preview-bg: #0d0b15;
    --preview-card: #14111f;
    --preview-border: #2a1f45;
    --preview-cat: #f5a623;
    --preview-price: #f5a623;
    --preview-item-bg: #1a162a;
    --preview-item-border: #2a2040;
    --preview-text: #e8dff8;
    --preview-sub: #8a7aaa;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top Bar ── */
  .topbar {
    background: var(--orange);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(245,166,35,0.4);
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo {
    width: 28px; height: 28px;
    background: white;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: white; letter-spacing: .5px; }
  .topbar-right { display: flex; gap: 8px; }

  .btn {
    padding: 7px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn-white { background: white; color: var(--orange-dark); }
  .btn-white:hover { background: #fff8e6; }
  .btn-outline { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,.5); }
  .btn-outline:hover { background: rgba(255,255,255,.15); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 52px);
  }

  /* ── Editor Panel ── */
  .editor {
    background: var(--bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: calc(100vh - 52px);
    position: sticky;
    top: 52px;
  }

  .editor-section {
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
  }

  .editor-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .editor-section-title::before {
    content: '';
    width: 3px; height: 12px;
    background: var(--orange);
    border-radius: 2px;
    display: inline-block;
  }

  .field { margin-bottom: 10px; }
  .field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 4px; }
  .field input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    background: var(--bg2);
    transition: border-color .15s;
    font-family: inherit;
  }
  .field input:focus { outline: none; border-color: var(--orange); background: white; }

  /* ── Category blocks ── */
  .cat-block {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .cat-head {
    background: var(--orange-light);
    padding: 9px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .cat-head-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--orange-dark);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-head-toggle { font-size: 11px; color: var(--orange-dark); transition: transform .2s; }
  .cat-head.collapsed .cat-head-toggle { transform: rotate(-90deg); }

  .cat-items { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }
  .cat-items.hidden { display: none; }

  .item-row-edit {
    display: grid;
    grid-template-columns: 1fr 130px;
    gap: 8px;
    align-items: center;
  }
  .item-row-edit input {
    padding: 6px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg2);
    font-family: inherit;
  }
  .item-row-edit input:focus { outline: none; border-color: var(--orange); background: white; }
  .price-input { text-align: right; color: var(--orange-dark) !important; font-weight: 600 !important; }

  /* ── Preview Panel ── */
  .preview-panel {
    overflow-y: auto;
    padding: 32px 40px;
    background: var(--bg3);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .preview-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 20px;
    align-self: flex-start;
  }

  /* ── Discord Card Preview ── */
  #preview-card {
    width: 600px;
    background: var(--preview-bg);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--preview-border);
    font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .pr-header {
    background: linear-gradient(135deg, #1a0f00 0%, #2d1a00 50%, #1a0f00 100%);
    border-bottom: 2px solid var(--orange);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .pr-icon {
    width: 42px; height: 42px;
    background: var(--orange);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .pr-title { font-size: 18px; font-weight: 700; color: #ffffff; letter-spacing: 1px; }
  .pr-subtitle { font-size: 11px; color: var(--orange); letter-spacing: 1.5px; margin-top: 2px; }

  .pr-body { padding: 20px 24px 24px; }

  .pr-cat {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--orange);
    margin: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .pr-cat:first-child { margin-top: 0; }
  .pr-cat::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(245,166,35,.3), transparent);
  }

  .pr-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 7px;
    border: 1px solid var(--preview-item-border);
    background: var(--preview-item-bg);
    margin-bottom: 4px;
  }
  .pr-item-left { display: flex; align-items: center; gap: 8px; }
  .pr-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); flex-shrink: 0; opacity: .7; }
  .pr-name { font-size: 13px; color: var(--preview-text); }
  .pr-price { font-size: 12.5px; font-weight: 700; color: var(--orange); white-space: nowrap; }
  .pr-currency { font-size: 10px; color: #6a5a40; margin-right: 3px; }

  .pr-footer {
    background: #09070f;
    border-top: 1px solid var(--preview-border);
    padding: 10px 24px;
    text-align: center;
    font-size: 10px;
    color: #3a2e55;
    letter-spacing: 1.5px;
  }

  /* ── Print/screenshot helper ── */
  @media print {
    .topbar, .editor { display: none !important; }
    .layout { display: block; }
    .preview-panel { padding: 0; background: transparent; }
    .preview-label { display: none; }
    #preview-card { box-shadow: none; }
  }

  .screenshot-hint {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
  }
  .screenshot-hint kbd {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">⚔️</div>
    <span class="topbar-title">Legion Shop Editor</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-outline" onclick="resetPrices()">بازنشانی</button>
    <button class="btn btn-white" onclick="window.print()">🖨 پرینت / ذخیره</button>
  </div>
</div>

<div class="layout">

  <!-- Editor -->
  <div class="editor">

    <!-- Shop Info -->
    <div class="editor-section">
      <div class="editor-section-title">اطلاعات شاپ</div>
      <div class="field">
        <label>نام شاپ</label>
        <input type="text" id="shopName" value="LEGION SHOP" oninput="update()">
      </div>
      <div class="field">
        <label>زیرنویس</label>
        <input type="text" id="shopSub" value="NIGHTMARE · GOLD MARKET" oninput="update()">
      </div>
    </div>

    <!-- Items -->
    <div class="editor-section">
      <div class="editor-section-title">آیتم‌ها و قیمت‌ها</div>
      <div id="cats-editor"></div>
    </div>

  </div>

  <!-- Preview -->
  <div class="preview-panel">
    <div class="preview-label">پیش‌نمایش دیسکورد</div>
    <div id="preview-card">
      <div class="pr-header">
        <div class="pr-icon">⚔️</div>
        <div>
          <div class="pr-title" id="pr-shop-name">LEGION SHOP</div>
          <div class="pr-subtitle" id="pr-shop-sub">NIGHTMARE · GOLD MARKET</div>
        </div>
      </div>
      <div class="pr-body" id="pr-body"></div>
      <div class="pr-footer">LEGION SHOP &nbsp;·&nbsp; ALL PRICES IN TOMAN &nbsp;·&nbsp; قیمت‌ها به تومان</div>
    </div>
    <div class="screenshot-hint">
      برای ذخیره: <kbd>Ctrl+P</kbd> → Save as PDF &nbsp;|&nbsp; یا اسکرین‌شات بگیر
    </div>
  </div>

</div>

<script>
const defaultData = [
  {
    cat: "⚔ Outland / TBC",
    items: [
      { name: "Outland Epic Pack", price: "9,879,952" },
      { name: "TBC Outland Heroic Pack", price: "4,939,953" },
      { name: "Anniversary Dark Portal Pack", price: "3,424,703" },
      { name: "Level 58 Character Boost (Anniversary)", price: "10,269,452" },
      { name: "Classic Name Change (Anniversary)", price: "1,709,953" },
    ]
  },
  {
    cat: "✦ Midnight Edition",
    items: [
      { name: "Midnight Epic Edition", price: "17,095,250" },
      { name: "Midnight Heroic Edition", price: "13,295,250" },
      { name: "Midnight Base Edition", price: "9,495,250" },
    ]
  },
  {
    cat: "🐉 MOP / Pandaria",
    items: [
      { name: "MOP Sha Heroic Pack", price: "4,939,953" },
      { name: "MOP Sha Epic Pack", price: "9,879,952" },
      { name: "Level 85 Character Boost (Pandaria)", price: "10,269,452" },
    ]
  },
  {
    cat: "📅 Subscription",
    items: [
      { name: "1 Month Subscription", price: "1,947,500" },
      { name: "3 Month Subscription", price: "4,987,500" },
      { name: "6 Month Subscription", price: "8,550,000" },
      { name: "12 Month Subscription", price: "17,100,000" },
    ]
  },
  {
    cat: "⚡ Retail — Character Services",
    items: [
      { name: "Level 80 Character Transfer (Retail)", price: "712,500" },
      { name: "Faction Change (Retail)", price: "5,134,703" },
      { name: "Name Change (Retail)", price: "1,709,953" },
      { name: "Race Change (Retail)", price: "4,279,703" },
    ]
  },
  {
    cat: "🏛 Classic — Character Services",
    items: [
      { name: "Classic Faction Change", price: "5,134,703" },
      { name: "Classic Race Change", price: "4,279,703" },
      { name: "Classic Name Change", price: "1,709,953" },
    ]
  }
];

let data = JSON.parse(JSON.stringify(defaultData));

function buildEditor() {
  const container = document.getElementById('cats-editor');
  container.innerHTML = '';
  data.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.innerHTML = `
      <div class="cat-head" onclick="toggleCat(this)">
        <span class="cat-head-name">${cat.cat}</span>
        <span class="cat-head-toggle">▼</span>
      </div>
      <div class="cat-items" id="cat-items-${ci}">
        ${cat.items.map((item, ii) => `
          <div class="item-row-edit">
            <input type="text" value="${item.name}" oninput="updateItem(${ci},${ii},'name',this.value)" placeholder="نام آیتم">
            <input type="text" class="price-input" value="${item.price}" oninput="updateItem(${ci},${ii},'price',this.value)" placeholder="قیمت">
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(block);
  });
}

function toggleCat(head) {
  head.classList.toggle('collapsed');
  const items = head.nextElementSibling;
  items.classList.toggle('hidden');
}

function updateItem(ci, ii, key, val) {
  data[ci].items[ii][key] = val;
  renderPreview();
}

function update() {
  document.getElementById('pr-shop-name').textContent = document.getElementById('shopName').value;
  document.getElementById('pr-shop-sub').textContent = document.getElementById('shopSub').value;
  renderPreview();
}

function renderPreview() {
  const body = document.getElementById('pr-body');
  body.innerHTML = data.map(cat => `
    <div class="pr-cat">${cat.cat}</div>
    ${cat.items.map(item => `
      <div class="pr-item">
        <div class="pr-item-left">
          <div class="pr-dot"></div>
          <span class="pr-name">${item.name}</span>
        </div>
        <span class="pr-price"><span class="pr-currency">تومان</span>${item.price}</span>
      </div>
    `).join('')}
  `).join('');
}

function resetPrices() {
  if (confirm('قیمت‌ها به حالت اولیه برمی‌گردند. ادامه می‌دهید؟')) {
    data = JSON.parse(JSON.stringify(defaultData));
    buildEditor();
    renderPreview();
  }
}

buildEditor();
renderPreview();
</script>
</body>
</html>
